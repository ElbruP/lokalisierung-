<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Template Replacer</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
    color:#222;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

h2{
    margin-top:25px;
    margin-bottom:10px;
}

textarea,
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    box-sizing:border-box;
    font-family: Consolas, monospace;
}

textarea{
    resize:vertical;
}

#template{
    height:220px;
}

#inputText{
    height:180px;
}

.result{
    background:white;
    border:1px solid #ccc;
    border-radius:6px;
    padding:15px;
    min-height:250px;
    white-space:pre-wrap;
    overflow:auto;
    font-family: Consolas, monospace;
}

button{
    padding:12px 22px;
    margin-right:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
    background:#2d89ef;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1b5fbf;
}

.radio-group{
    margin-bottom:15px;
}

.radio-group label{
    margin-right:15px;
}

.small-text{
    color:#666;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Універсальний генератор шаблонів</h1>

<h2>1. Шаблон</h2>

<div class="small-text">
Встав шаблон та напиши текст який потрібно замінювати.
</div>

<textarea id="template">ua-country {
c:TEXT
localization_key = ua_country_TEXT
}</textarea>

<h2>2. Який текст замінювати</h2>

<input type="text" id="replaceText" value="TEXT">

<h2>3. Значення</h2>

<div class="small-text">
Кожне значення з нового рядка
</div>

<textarea id="inputText">PRC
GBR
HND</textarea>

<h2>4. Обробка змінних</h2>

<div class="small-text">
Формат:
<br>
ua_country: "abcd"
</div>

<div class="radio-group">

<input
    type="radio"
    id="variableName"
    name="choice"
    value="1"
    checked
>

<label for="variableName">
Назва перемінної
</label>

<input
    type="radio"
    id="variableValue"
    name="choice"
    value="2"
>

<label for="variableValue">
Значення перемінної
</label>

</div>

<button onclick="generateTemplate()">
Згенерувати шаблон
</button>

<button onclick="processVariables()">
Обробити змінні
</button>

<button onclick="copyResult()">
Копіювати результат
</button>

<button onclick="clearAll()">
Очистити
</button>

<h2>Результат</h2>

<div id="result" class="result"></div>

</div>

<script>

function generateTemplate(){

    const template =
        document.getElementById("template").value;

    const replaceText =
        document.getElementById("replaceText").value;

    const inputText =
        document.getElementById("inputText").value.trim();

    const resultDiv =
        document.getElementById("result");

    resultDiv.textContent = "";

    if(!template){

        alert("Помилка: встав шаблон");

        return;
    }

    if(!replaceText){

        alert("Помилка: встав текст для заміни");

        return;
    }

    if(!inputText){

        alert("Помилка: встав значення");

        return;
    }

    const lines = inputText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    let result = "";

    lines.forEach(line => {

        const generated =
            template.replaceAll(replaceText, line);

        result += generated + "\n\n";

    });

    resultDiv.textContent = result;
}

function processVariables(){

    const inputText =
        document.getElementById("inputText").value.trim();

    const resultDiv =
        document.getElementById("result");

    resultDiv.textContent = "";

    if(!inputText){

        alert("Помилка: встав значення");

        return;
    }

    const lines = inputText.split("\n");

    const results = [];

    const choice =
        document.querySelector(
            'input[name="choice"]:checked'
        ).value;

    lines.forEach(line => {

        if(!line.includes(":")){

            results.push(
                `Помилка: '${line}' - неправильний формат`
            );

            return;
        }

        const match =
            line.trim().match(/^(.+?):\s*"(.*?)"$/);

        if(!match){

            results.push(
                `Помилка: '${line}' - неправильний формат`
            );

            return;
        }

        const variableName = match[1];
        const variableValue = match[2];

        if(choice === "1"){

            results.push(variableName.trim());

        }
        else if(choice === "2"){

            results.push(variableValue.trim());

        }

    });

    resultDiv.textContent = results.join("\n");
}

function copyResult(){

    const result =
        document.getElementById("result").textContent;

    if(!result){

        alert("Немає результату");

        return;
    }

    navigator.clipboard.writeText(result);

    alert("Результат скопійовано");
}

function clearAll(){

    document.getElementById("template").value = "";

    document.getElementById("replaceText").value = "";

    document.getElementById("inputText").value = "";

    document.getElementById("result").textContent = "";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Variable Processor + Template Generator</title>

<style>

body{
    font-family: Arial;
    margin:20px;
}

textarea{
    width:100%;
    height:150px;
    margin-bottom:10px;
}

.result{
    width:100%;
    min-height:150px;
    border:1px solid black;
    padding:5px;
    white-space:pre-wrap;
}

.radio-container{
    margin:10px 0;
}

button{
    margin-bottom:10px;
}

</style>
</head>

<body>

<h1>
Обробка змінних + Генератор шаблонів
</h1>

<!-- ================================= -->
<!-- СТАРА СИСТЕМА -->
<!-- ================================= -->

<h2>Обробка змінних</h2>

<p>
Введи перемінну
(наприклад ua_country: "abcd")
</p>

<textarea id="inputText"></textarea>

<p>Що потрібно вивести?</p>

<div class="radio-container">

<input
    type="radio"
    id="variableName"
    name="choice"
    value="1"
    checked
>

<label for="variableName">
Назва перемінної
</label>

<br>

<input
    type="radio"
    id="variableValue"
    name="choice"
    value="2"
>

<label for="variableValue">
Значення перемінної
</label>

</div>

<button onclick="processVariables()">
Обробити змінні
</button>

<h3>Результат:</h3>

<div id="result" class="result"></div>



<!-- ================================= -->
<!-- НОВА СИСТЕМА -->
<!-- ================================= -->

<h2>
Генератор шаблонів
</h2>

<p>
Шаблон
</p>

<textarea id="template">ua-country {
c:TEXT
localization_key = ua_country_TEXT
}</textarea>

<p>
Який текст замінювати
</p>

<input
    type="text"
    id="replaceText"
    value="TEXT"
>

<p>
Значення
</p>

<textarea id="templateValues">PRC
GBR
HND</textarea>

<button onclick="generateTemplate()">
Згенерувати шаблон
</button>

<button onclick="copyTemplateResult()">
Копіювати результат
</button>

<h3>
Результат шаблону
</h3>

<div id="templateResult" class="result"></div>

<script>

function processVariables(){

    const inputText =
        document.getElementById("inputText")
        .value
        .trim();

    const resultDiv =
        document.getElementById("result");

    resultDiv.innerHTML = "";

    if(!inputText){

        alert("Помилка: Вставне значення");

        return;
    }

    const lines = inputText.split("\n");

    const results = [];

    const choice =
        document.querySelector(
            'input[name="choice"]:checked'
        ).value;

    lines.forEach(line => {

        if(!line.includes(":")){

            results.push(
                `Помилка: '${line}' - неправильний формат`
            );

            return;
        }

        const match =
            line.trim().match(
                /^(.+?):\s*"(.*?)"$/
            );

        if(!match){

            results.push(
                `Помилка: '${line}' - неправильний формат`
            );

            return;
        }

        const variableName = match[1];

        const variableValue = match[2];

        if(choice === '1'){

            results.push(
                variableName.trim()
            );

        }
        else if(choice === '2'){

            results.push(
                variableValue.trim()
            );

        }

    });

    resultDiv.innerHTML =
        results.join("<br>");
}



function generateTemplate(){

    const template =
        document.getElementById("template")
        .value;

    const replaceText =
        document.getElementById("replaceText")
        .value;

    const inputText =
        document.getElementById("templateValues")
        .value
        .trim();

    const resultDiv =
        document.getElementById("templateResult");

    resultDiv.textContent = "";

    if(!template){

        alert("Встав шаблон");

        return;
    }

    if(!replaceText){

        alert("Встав текст для заміни");

        return;
    }

    if(!inputText){

        alert("Встав значення");

        return;
    }

    const lines = inputText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    let result = "";

    lines.forEach(line => {

        const generated =
            template.replaceAll(
                replaceText,
                line
            );

        result += generated + "\n\n";

    });

    resultDiv.textContent = result;
}



function copyTemplateResult(){

    const result =
        document.getElementById("templateResult")
        .textContent;

    if(!result){

        alert("Немає результату");

        return;
    }

    navigator.clipboard.writeText(result);

    alert("Результат скопійовано");
}

</script>

</body>
</html>

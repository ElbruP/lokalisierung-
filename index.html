<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Template Generator</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        h2,h3{
            margin-bottom: 5px;
        }

        textarea{
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: vertical;
        }

        #template{
            height: 180px;
        }

        #inputText{
            height: 160px;
        }

        .result{
            width: 100%;
            min-height: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: Consolas, monospace;
        }

        button{
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border: none;
            background: #2d89ef;
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        button:hover{
            background: #1b5fbf;
        }

    </style>
</head>

<body>

    <h2>Універсальний генератор шаблонів</h2>

    <h3>Шаблон</h3>

    <p>
        Використовуй <b>()</b> як місце заміни
    </p>

    <textarea id="template">ua-country {
c:()
localization_key = ua_country_()
}</textarea>

    <h3>Текст</h3>

    <textarea id="inputText">PRC
GBR
HND</textarea>

    <button onclick="generateTemplate()">
        Згенерувати
    </button>

    <h3>Результат</h3>

    <div id="result" class="result"></div>

<script>

function generateTemplate(){

    // Отримати шаблон
    const template =
        document.getElementById("template").value;

    // Отримати текст
    const inputText =
        document.getElementById("inputText").value.trim();

    // Блок результату
    const resultDiv =
        document.getElementById("result");

    // Очистити попередній результат
    resultDiv.textContent = "";

    // Перевірка шаблону
    if(!template){

        alert("Помилка: встав шаблон");

        return;
    }

    // Перевірка тексту
    if(!inputText){

        alert("Помилка: встав текст");

        return;
    }

    // Розділити текст по рядках
    const lines = inputText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    // Фінальний результат
    let result = "";

    // Для кожної строки
    lines.forEach(line => {

        // Замінити ВСІ ()
        const generated =
            template.replaceAll("()", line);

        // Додати в результат
        result += generated + "\n\n";

    });

    // Вивести результат
    resultDiv.textContent = result;
}

</script>

</body>
</html>
